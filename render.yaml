# ================================================
# Jarvis Yordamchim — Render.com Deploy
# ================================================

services:
  # 1. Telegram Bot — Background Worker (Web Service EMAS!)
  #    Bot polling qiladi, HTTP port kerak emas
  - type: worker
    name: jarvis-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false          # Render Dashboard'da qo'lda kiritasiz
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: jarvis-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: jarvis-redis
          property: connectionString
      - key: WEATHER_API_KEY
        sync: false

  # 2. Celery Worker — Background Worker
  - type: worker
    name: jarvis-celery-worker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery --app tasks worker --loglevel info --concurrency 4
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: jarvis-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: jarvis-redis
          property: connectionString
      - key: WEATHER_API_KEY
        sync: false

  # 3. Flower Monitor — Web Service (ixtiyoriy)
  - type: web
    name: jarvis-flower
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery flower --app tasks --port $PORT
    envVars:
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: jarvis-redis
          property: connectionString

# Redis (Broker + Backend)
databases:
  - type: redis
    name: jarvis-redis
    maxmemoryPolicy: noeviction
    plan: starter
